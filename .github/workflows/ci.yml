name: Django CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependencias del sistema (WeasyPrint / Cairo / Postgres)
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libcairo2 \
          libpango-1.0-0 \
          libpangocairo-1.0-0 \
          libgdk-pixbuf-2.0-0 \
          libffi-dev \
          shared-mime-info \
          postgresql-client

    - name: Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Django System Check
      run: |
        cd billetera
        python manage.py check

    - name: Correr suite de pruebas (Tests)
      run: |
        cd billetera
        python manage.py test
      env:
        ENV: development
        SECRET_KEY: test-secret-key-for-github-actions
        DEBUG: True
